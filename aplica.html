<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabaja con nosotros · Amazinn Places</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{ --azul:#1c3d5a; --azul2:#2a5a82; --gris:#eef2f6; --gris2:#d7dee6; --suave:#7a8794; --ok:#16a085; }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Poppins',system-ui,sans-serif;background:linear-gradient(160deg,#1c3d5a 0%,#2a5a82 45%,#eef2f6 45%);min-height:100vh;color:#23303c}
  .wrap{max-width:540px;margin:0 auto;padding:28px 18px 60px}
  .head{text-align:center;color:#fff;padding:14px 0 22px}
  .head .logo{font-size:30px;font-weight:800;letter-spacing:.5px}
  .head .sub{font-size:14px;opacity:.92;margin-top:4px}
  .card{background:#fff;border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.18);padding:26px 22px}
  h1{font-size:20px;margin:0 0 4px;color:var(--azul)}
  .lead{font-size:13.5px;color:var(--suave);margin:0 0 18px}
  label{display:block;font-weight:600;font-size:13.5px;margin:14px 0 6px;color:var(--azul)}
  input[type=text],input[type=tel]{width:100%;padding:12px 14px;border:1px solid var(--gris2);border-radius:11px;font-family:inherit;font-size:15px;outline:none}
  input:focus{border-color:var(--azul2)}
  .areas{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1.5px solid var(--gris2);border-radius:22px;padding:8px 14px;font-size:13.5px;cursor:pointer;user-select:none;transition:all .12s;background:#fff;color:#41505e}
  .chip.on{background:var(--azul);border-color:var(--azul);color:#fff;font-weight:600}
  .file{border:2px dashed var(--gris2);border-radius:12px;padding:18px;text-align:center;cursor:pointer;color:var(--suave);font-size:13.5px}
  .file.has{border-color:var(--ok);color:var(--ok);font-weight:600;background:#f0faf6}
  .btn{width:100%;margin-top:22px;padding:14px;border:none;border-radius:12px;background:var(--azul);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer}
  .btn:disabled{opacity:.55;cursor:default}
  .note{font-size:11.5px;color:var(--suave);margin-top:14px;text-align:center;line-height:1.5}
  .ok{text-align:center;padding:18px 4px}
  .ok .big{font-size:54px}
  .ok h2{color:var(--ok);margin:8px 0 6px}
  .err{background:#fdecea;color:#c0392b;border-radius:10px;padding:10px 12px;font-size:13px;margin-top:14px;display:none}
  .req{color:#c0392b}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div class="logo">Amazinn Places</div>
    <div class="sub">Únete a nuestro equipo</div>
  </div>
  <div class="card" id="card">
    <h1>Envíanos tu hoja de vida</h1>
    <p class="lead">Déjanos tus datos y tu CV. Revisaremos tu candidatura y, si encaja con lo que buscamos, te contactaremos.</p>

    <label>Nombre y apellido <span class="req">*</span></label>
    <input type="text" id="f_nombre" placeholder="Tu nombre completo" autocomplete="name">

    <label>Teléfono <span class="req">*</span></label>
    <input type="tel" id="f_tel" placeholder="Ej: +507 6000 0000" autocomplete="tel">

    <label>Área(s) para la que quieres aplicar <span class="req">*</span></label>
    <div class="areas" id="f_areas"></div>

    <label>Hoja de vida (CV) <span class="req">*</span></label>
    <div class="file" id="f_filebox" onclick="document.getElementById('f_file').click()">📎 Toca para adjuntar tu CV (PDF, Word o imagen)</div>
    <input type="file" id="f_file" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg" style="display:none" onchange="onFile()">

    <div class="err" id="f_err"></div>
    <button class="btn" id="f_btn" onclick="enviar()">Enviar candidatura</button>
    <div class="note">Tus datos se usarán únicamente para procesos de selección de Amazinn Places.</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL      = "https://lignlqomotopwottnqkk.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_5e5M44BylweO-pzG74H8tw_N-uSjd1z";
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const AREAS=['Atención al cliente','Mantenimiento','Limpieza','Almacén','Nocturnos','Otros'];
  let sel=new Set(), file=null;
  const ab=document.getElementById('f_areas');
  AREAS.forEach(a=>{ const el=document.createElement('div'); el.className='chip'; el.textContent=a;
    el.onclick=()=>{ if(sel.has(a)){sel.delete(a);el.classList.remove('on');} else {sel.add(a);el.classList.add('on');} };
    ab.appendChild(el); });

  function onFile(){ const f=document.getElementById('f_file').files[0]; file=f||null; const box=document.getElementById('f_filebox');
    if(file){ box.classList.add('has'); box.textContent='✓ '+file.name; } else { box.classList.remove('has'); box.textContent='📎 Toca para adjuntar tu CV (PDF, Word o imagen)'; } }

  function showErr(m){ const e=document.getElementById('f_err'); e.textContent=m; e.style.display='block'; }

  async function enviar(){
    const nombre=document.getElementById('f_nombre').value.trim();
    const tel=document.getElementById('f_tel').value.trim();
    const areas=[...sel];
    document.getElementById('f_err').style.display='none';
    if(!nombre){ showErr('Escribe tu nombre y apellido.'); return; }
    if(!tel){ showErr('Escribe tu teléfono.'); return; }
    if(!areas.length){ showErr('Elige al menos un área.'); return; }
    if(!file){ showErr('Adjunta tu hoja de vida (CV).'); return; }
    if(file.size > 10*1024*1024){ showErr('El archivo es muy grande (máx. 10 MB).'); return; }

    const btn=document.getElementById('f_btn'); btn.disabled=true; btn.textContent='Enviando…';
    try{
      const ext=(file.name.split('.').pop()||'pdf').toLowerCase();
      const safe=nombre.normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-zA-Z0-9]/g,'_').slice(0,40);
      const path=Date.now()+'_'+safe+'.'+ext;
      const up=await sb.storage.from('cv').upload(path, file, {upsert:false});
      if(up.error) throw up.error;
      const ins=await sb.from('reclutamiento').insert({nombre,telefono:tel,areas,cv_path:path,cv_nombre:file.name,estado:'recibido'});
      if(ins.error) throw ins.error;
      document.getElementById('card').innerHTML=`<div class="ok"><div class="big">🎉</div><h2>¡Candidatura enviada!</h2>
        <p class="lead">Gracias, ${nombre.split(' ')[0]}. Hemos recibido tu CV. Si encaja con lo que buscamos, te contactaremos por teléfono.</p></div>`;
    }catch(err){
      btn.disabled=false; btn.textContent='Enviar candidatura';
      showErr('No se pudo enviar. Revisa tu conexión e inténtalo de nuevo. ('+((err&&err.message)||err)+')');
    }
  }
</script>
</body>
</html>
